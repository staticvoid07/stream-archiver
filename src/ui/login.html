<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Archiver — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center">
  <div x-data="loginPage()" class="bg-slate-800 rounded-lg shadow-xl p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold mb-6">Stream Archiver</h1>
    <form @submit.prevent="submit()" class="space-y-4">
      <div>
        <label class="block text-sm mb-1" for="username">Username</label>
        <input id="username" x-model="username" type="text" autocomplete="username"
               class="w-full rounded bg-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm mb-1" for="password">Password</label>
        <input id="password" x-model="password" type="password" autocomplete="current-password"
               class="w-full rounded bg-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <p x-show="error" x-text="error" class="text-red-400 text-sm"></p>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-500 rounded py-2 font-medium transition">
        Log in
      </button>
    </form>
  </div>

  <script>
    function loginPage() {
      return {
        username: '',
        password: '',
        error: '',
        async submit() {
          this.error = '';
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: this.username, password: this.password }),
          });
          if (res.ok) {
            window.location.href = '/';
          } else {
            const data = await res.json().catch(() => ({}));
            this.error = data.error || 'Login failed';
          }
        },
      };
    }
  </script>
</body>
</html>
